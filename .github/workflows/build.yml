name: Build

on:
  push:
    branches:
      - master
      - experimental
      - map-workaround
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '24.x'
  NPM_VERSION: '11.6.2'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Use npm 11
        run: npm install --global npm@${{ env.NPM_VERSION }}
      - name: Install dependencies
        run: npm ci
      - name: Lint backend
        run: npm run lint
      - name: Build backend
        run: npm run build-backend-only
      - name: Build UI
        run: npm run build --prefix ui
      - name: Check UI types
        run: npm run lint --prefix ui
      - name: Test backend
        run: npm test | tee test-output.log; test ${PIPESTATUS[0]} -eq 0
      - name: Prepare coverage badge
        if: contains('refs/heads/master refs/heads/experimental', github.ref)
        run: |
          SUMMARY="$(tail -3 test-output.log | head -1)"
          TOKENS=($SUMMARY)
          echo "COVERAGE=${TOKENS[2]}" >> "$GITHUB_ENV"
          REF=${{ github.ref }}
          IFS='/' read -ra PATHS <<< "$REF"
          BRANCH_NAME="${PATHS[1]}_${PATHS[2]}"
          echo "BRANCH=${BRANCH_NAME}" >> "$GITHUB_ENV"
      - name: Create coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        if: contains('refs/heads/master refs/heads/experimental', github.ref)
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 442a5cdea03dd79a87b34339a7a16a2c
          filename: dayz-server-manager__${{ env.BRANCH }}.json
          label: Test Coverage
          message: ${{ env.COVERAGE }}
          color: green
          namedLogo: typescript

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Use npm 11
        run: npm install --global npm@${{ env.NPM_VERSION }}
      - name: Download Mikero tools
        uses: arma-actions/mikero-tools@latest
      - name: Install dependencies
        run: npm ci
      - name: Set version
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version ${{ github.ref_name }} --no-git-tag-version
      - name: Build application and PBOs
        run: npm run build
      - name: Pack Windows executable
        run: npm run pack:windows
      - name: Zip Windows artifact
        run: Compress-Archive -Path 'build/*' -DestinationPath 'server-manager.zip'
      - name: Archive Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-manager-windows
          path: server-manager.zip

  build-windows-debug:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Use npm 11
        run: npm install --global npm@${{ env.NPM_VERSION }}
      - name: Download Mikero tools
        uses: arma-actions/mikero-tools@latest
      - name: Install dependencies
        run: npm ci
      - name: Set version
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version ${{ github.ref_name }} --no-git-tag-version
      - name: Set mod debug flags
        run: |
          echo "#define DayZServerManager" > "watcher_mod/DayZServerManager/Scripts/Common/DayZServerManager/ServerManagerDefines.c"
          echo "#define DZSM_DEBUG" >> "watcher_mod/DayZServerManager/Scripts/Common/DayZServerManager/ServerManagerDefines.c"
          echo "#define DZSM_DEBUG_CONTAINER" >> "watcher_mod/DayZServerManager/Scripts/Common/DayZServerManager/ServerManagerDefines.c"
      - name: Set manager debug flags
        run: |
          echo "export const dzsmDebugHttp = true;" > "src/config/constants.ts"
          echo "export const dzsmDebugLogReader = true;" >> "src/config/constants.ts"
          echo "export const dzsmDebugProcessList = true;" >> "src/config/constants.ts"
      - name: Build application and PBOs
        run: npm run build
      - name: Pack Windows debug executable
        run: npm run pack:windows
      - name: Zip Windows debug artifact
        run: Compress-Archive -Path 'build/*' -DestinationPath 'server-manager.zip'
      - name: Archive Windows debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-manager-windows-debug
          path: server-manager.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 zip
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Use npm 11
        run: npm install --global npm@${{ env.NPM_VERSION }}
      - name: Download Mikero tools
        uses: arma-actions/mikero-tools@latest
      - name: Install dependencies
        run: npm ci
      - name: Set version
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${{ github.ref_name }}" --no-git-tag-version
      - name: Build application and PBOs
        run: npm run build
      - name: Pack Linux executable
        run: npm run pack:linux
      - name: Zip Linux artifact
        run: zip -r server-manager.zip build/
      - name: Archive Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-manager-linux
          path: server-manager.zip

  build-docker:
    runs-on: ubuntu-latest
    needs:
      - quality
      - build-linux
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: server-manager-linux
      - name: Unpack Linux artifact
        run: unzip server-manager.zip
      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - quality
      - build-linux
      - build-windows
      - build-windows-debug
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-manager-*
          path: artifacts
      - name: Prepare release assets
        run: |
          mv artifacts/server-manager-windows/server-manager.zip server-manager-windows.zip
          mv artifacts/server-manager-windows-debug/server-manager.zip server-manager-windows-debug.zip
          mv artifacts/server-manager-linux/server-manager.zip server-manager-linux.zip
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${{ github.ref_name }}"
          server-manager-windows.zip
          server-manager-windows-debug.zip
          server-manager-linux.zip
          --repo "${{ github.repository }}"
          --title "Release ${{ github.ref_name }}"
          --generate-notes
