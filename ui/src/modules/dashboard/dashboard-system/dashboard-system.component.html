<section class="telemetry-section" aria-labelledby="telemetry-heading">
    <div class="section-heading">
        <div>
            <p>Telemetry</p>
            <h2 id="telemetry-heading">Host performance</h2>
        </div>
        <a routerLink="/dashboard/system">Open system telemetry <span aria-hidden="true">&rarr;</span></a>
    </div>

    <div class="row chart-grid">
        <div class="col-xl-6 chart-grid__item">
            <sb-card>
                <div class="card-header" id="dashboard-cpu-chart">
                    <span><fa-icon class="mr-1" [icon]='["fas", "chart-area"]'></fa-icon>System CPU</span>
                    <small>Host load</small>
                </div>
                <div class="card-body" role="group" aria-labelledby="dashboard-cpu-chart">
                    <sb-charts-area [chartConf]="(commonService.chart('system', 'cpu') | async)!"></sb-charts-area>
                </div>
            </sb-card>
        </div>
        <div class="col-xl-6 chart-grid__item">
            <sb-card>
                <div class="card-header" id="dashboard-ram-chart">
                    <span><fa-icon class="mr-1" [icon]='["fas", "chart-area"]'></fa-icon>System RAM</span>
                    <small>Memory pressure</small>
                </div>
                <div class="card-body" role="group" aria-labelledby="dashboard-ram-chart">
                    <sb-charts-area [chartConf]="(commonService.chart('system', 'ram') | async)!"></sb-charts-area>
                </div>
            </sb-card>
        </div>
    </div>
</section>
