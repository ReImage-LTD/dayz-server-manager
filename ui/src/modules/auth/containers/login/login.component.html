<sb-layout-auth class="auth-layout">
    <div class="auth-console">
        <section class="auth-panel" aria-labelledby="login-heading">
            <header class="panel-header">
                <div>
                    <p class="eyebrow">DayZ server manager</p>
                    <h1 id="login-heading">Operations access</h1>
                    <p class="panel-copy">Authenticate to continue to the management console.</p>
                </div>
                <span class="system-state"><span aria-hidden="true"></span>Secure session</span>
            </header>

            <form class="login-form" #loginForm="ngForm" (ngSubmit)="login()" novalidate>
                <div class="form-group">
                    <label for="inputUser">Username</label>
                    <input class="form-control"
                           id="inputUser"
                           name="username"
                           type="text"
                           placeholder="Operator username"
                           autocomplete="username"
                           autocapitalize="none"
                           spellcheck="false"
                           required
                           [disabled]="isLoading"
                           [(ngModel)]="username"
                    />
                </div>

                <div class="form-group">
                    <label for="inputPassword">Password</label>
                    <input class="form-control"
                           id="inputPassword"
                           name="password"
                           type="password"
                           placeholder="Account password"
                           autocomplete="current-password"
                           required
                           [disabled]="isLoading"
                           [(ngModel)]="password"
                    />
                </div>

                <div class="form-group remember-row">
                    <div class="custom-control custom-checkbox">
                        <input class="custom-control-input"
                               id="rememberPasswordCheck"
                               name="remember"
                               type="checkbox"
                               [disabled]="isLoading"
                               [(ngModel)]="remember"
                        />
                        <label class="custom-control-label" for="rememberPasswordCheck">Remember this session</label>
                    </div>
                    <span>Use only on a trusted device</span>
                </div>

                <div class="login-error" *ngIf="failure" role="alert" aria-live="assertive">
                    <strong>Access denied</strong>
                    <span>{{ failure }}</span>
                </div>

                <button class="btn login-button"
                        type="submit"
                        [disabled]="loginForm.invalid || isLoading"
                        [attr.aria-busy]="isLoading"
                >
                    <span class="spinner-border spinner-border-sm" *ngIf="isLoading" aria-hidden="true"></span>
                    <span>{{ isLoading ? 'Authenticating...' : 'Enter console' }}</span>
                </button>
            </form>

            <footer class="panel-footer">
                <span>Authorized operators only</span>
                <span class="protocol">TLS / BASIC AUTH</span>
            </footer>
        </section>
    </div>
</sb-layout-auth>
