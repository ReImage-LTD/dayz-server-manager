<sb-layout-error>
    <div class="error-console">
        <section class="error-panel" aria-labelledby="error-heading">
            <header class="error-panel__header">
                <span>Operations console / server</span>
                <span>Service fault</span>
            </header>
            <div class="error-panel__body">
                <p class="error-code" aria-hidden="true">500</p>
                <div class="error-detail">
                    <p class="eyebrow">Internal server error</p>
                    <h1 id="error-heading">The operation could not complete</h1>
                    <p class="error-copy">The manager encountered an unexpected condition while processing this request.</p>
                    <a class="console-link" routerLink="/dashboard">
                        <fa-icon class="mr-2" [icon]='["fas", "arrow-left"]'></fa-icon>Return to dashboard
                    </a>
                </div>
            </div>
            <footer class="error-panel__footer"><span>HTTP_STATUS 500</span><span>INTERNAL_SERVICE_FAILURE</span></footer>
        </section>
    </div>
</sb-layout-error>
