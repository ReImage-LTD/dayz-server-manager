<sb-layout-dashboard>
    <sb-dashboard-head title="Audit Events" [hideBreadcrumbs]="false"></sb-dashboard-head>
    <section class="audit-console" aria-labelledby="audit-console-heading">
        <header class="audit-header">
            <div>
                <span class="eyebrow">Operations history</span>
                <h3 id="audit-console-heading">Audit event stream</h3>
            </div>
            <span class="stream-state">RECORDING</span>
        </header>
        <div class="audit-body">
            <sb-audit-table [pageSize]="20"></sb-audit-table>
        </div>
    </section>
</sb-layout-dashboard>
