<nav class="sb-topnav navbar navbar-expand navbar-dark" aria-label="Application toolbar">
    <button class="btn btn-link btn-sm order-1 order-lg-0 toolbar-button" id="sidebarToggle" data-cy="topNavToggleSideNav" (click)="toggleSideNav()" aria-label="Toggle primary navigation">
        <fa-icon [icon]='["fas", "bars"]'></fa-icon>
    </button>
    <a class="navbar-brand" routerLink="/dashboard"><span class="brand-mark">DZ</span><span class="brand-copy"><strong>Server Manager</strong><small>Operations console</small></span></a>

    <sb-breadcrumbs class="hide-top-nav"></sb-breadcrumbs>

    <div class="page-context hide-page-header">
        <span class="context-kicker">Workspace</span>
        <strong>{{title || 'Overview'}}</strong>
    </div>

    <div class="server-context hide-top-nav" *ngIf="appCommon.SERVER_INFO | async as info">
        <span class="state-indicator"></span>
        <span><strong>{{ info.name || 'DayZ server' }}</strong><small>{{ info.worldName || 'World unavailable' }}</small></span>
    </div>

    <div class="refresh-control">
        <label for="tickSelect">Refresh</label>
        <select id="tickSelect" class="form-select form-select-sm" aria-label="Fetch Delay"
            [(ngModel)]="refreshRate"
            (ngModelChange)="onRefreshRateChange($event)"
        >
            <option value="-1">Disabled</option>
            <option value="10">10 sec</option>
            <option value="20">20 sec</option>
            <option selected value="30">30 sec</option>
            <option value="60">60 sec</option>
        </select>
        <button class="btn btn-link order-1 order-lg-0 toolbar-button"
                id="refresh"
                (click)="refreshNow()"
                title="Refresh Now"
                aria-label="Refresh server data now"
        >
            <fa-icon [icon]='["fas", "sync"]'></fa-icon>
        </button>
    </div>

    <button class="btn btn-link order-1 order-lg-0 toolbar-button" id="logout" (click)="logout()" aria-label="Log out" title="Log out">
        <fa-icon [icon]='["fas", "sign-out-alt"]'></fa-icon>
    </button>
</nav>
